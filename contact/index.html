        <h1>Contact</h1>

        <form action="mailto:e3ngo@ucsd.edu" method="POST" enctype="text/plain">
            <label>
                Your email:
                <input name="email" type="email" required>
            </label>
            <br>
            <label>
                Subject:
                <input name="subject">
            </label>
            <br>
            <label>
                Message:
                <textarea name="body" rows="6" cols="40"></textarea>
            </label>
            <br>
            <button>Send</button>
        </form>

        <p>Note: submitting will open the user's mail client using the `mailto:` protocol.</p>
    </body>
